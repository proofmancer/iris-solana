[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.26"

[features]
resolution = true
skip-lint = false

[programs.devnet]
iris_receipts = "GvXMdAupDkGQxNXVEPMNowxFbyuBS5Bi4Kfq1zcDdopK"

[programs.localnet]
iris_receipts = "ALhJTXgUqGmpTbGUp4oPKfmC6m6zxgqq264gZVmanEWg"
verifier_example = "3wU2eb2R1QPTuaPy6ZuqoJUUwAq2RGi26h2xJnDQLDPX"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[hooks]

[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
url = "https://api.devnet.solana.com"
ledger = ".anchor/test-ledger"
rpc_port = 8899
