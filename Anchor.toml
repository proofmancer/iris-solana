[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
iris_receipts = "Ir1sRecPt11111111111111111111111111111111"
verifier_example = "Ver1f1erEx111111111111111111111111111111111"

[programs.devnet]
iris_receipts = "Ir1sRecPt11111111111111111111111111111111"
verifier_example = "Ver1f1erEx111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 10000
shutdown_wait = 2000
upgradeable = false

[test.validator]
url = "https://api.devnet.solana.com"
